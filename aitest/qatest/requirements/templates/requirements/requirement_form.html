{% extends 'base.html' %}
{% load django_bootstrap5 %}

{% block content %}
<div class="page-head">
    <div>
        <h1 class="page-title">{{ title }}</h1>
        <div class="page-subtitle">填写需求信息并关联项目</div>
    </div>
    <div class="d-flex gap-2">
        <a href="{% url 'requirement_list' %}" class="btn btn-outline-secondary">返回列表</a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% bootstrap_form form %}
            <div class="d-flex gap-2">
                {% bootstrap_button "保存" button_type="submit" button_class="btn-primary" %}
                <a href="{% url 'requirement_list' %}" class="btn btn-outline-secondary">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
