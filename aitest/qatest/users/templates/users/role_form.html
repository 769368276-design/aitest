{% extends "base.html" %}
{% load django_bootstrap5 %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="page-head">
            <h1 class="page-title">{{ title }}</h1>
            <div class="page-subtitle">配置角色名称与系统权限</div>
        </div>

        <div class="card">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% bootstrap_form form %}
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">保存</button>
                        <a href="{% url 'role_list' %}" class="btn btn-outline-secondary">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
