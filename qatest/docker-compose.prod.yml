services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DJANGO_DB_NAME:-qa_platform}
      POSTGRES_USER: ${DJANGO_DB_USER:-qa_platform}
      POSTGRES_PASSWORD: ${DJANGO_DB_PASSWORD:-qa_platform}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

  web:
    image: qatest-web
    build:
      context: .
      args:
        PY_BASE_IMAGE: ${PY_BASE_IMAGE:-python:3.12-slim}
        APT_DEBIAN_MIRROR: ${APT_DEBIAN_MIRROR:-}
        APT_DEBIAN_SECURITY_MIRROR: ${APT_DEBIAN_SECURITY_MIRROR:-}
        PLAYWRIGHT_DOWNLOAD_HOST: ${PLAYWRIGHT_DOWNLOAD_HOST:-https://playwright.azureedge.net}
        PLAYWRIGHT_BROWSERS_PATH: ${PLAYWRIGHT_BROWSERS_PATH:-/ms-playwright}
        SKIP_PLAYWRIGHT_BROWSER_DOWNLOAD: ${SKIP_PLAYWRIGHT_BROWSER_DOWNLOAD:-0}
    env_file:
      - .env
    environment:
      DJANGO_DB_HOST: db
      DJANGO_DB_ENGINE: postgres
      PLAYWRIGHT_BROWSERS_PATH: ${PLAYWRIGHT_BROWSERS_PATH:-/ms-playwright}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media:/app/media
      - ./pw-browsers:${PLAYWRIGHT_BROWSERS_PATH:-/ms-playwright}:rw
    shm_size: "1gb"
    command: ["bash", "-lc", "python manage.py migrate --noinput && python manage.py init_data && gunicorn qa_platform.wsgi:application --bind 0.0.0.0:8003 --workers 2 --threads 4 --timeout 180"]
    expose:
      - "8003"
    restart: unless-stopped

  worker:
    image: qatest-worker
    build:
      context: .
      args:
        PY_BASE_IMAGE: ${PY_BASE_IMAGE:-python:3.12-slim}
        APT_DEBIAN_MIRROR: ${APT_DEBIAN_MIRROR:-}
        APT_DEBIAN_SECURITY_MIRROR: ${APT_DEBIAN_SECURITY_MIRROR:-}
        PLAYWRIGHT_DOWNLOAD_HOST: ${PLAYWRIGHT_DOWNLOAD_HOST:-https://playwright.azureedge.net}
        PLAYWRIGHT_BROWSERS_PATH: ${PLAYWRIGHT_BROWSERS_PATH:-/ms-playwright}
        SKIP_PLAYWRIGHT_BROWSER_DOWNLOAD: ${SKIP_PLAYWRIGHT_BROWSER_DOWNLOAD:-0}
    env_file:
      - .env
    environment:
      DJANGO_DB_HOST: db
      DJANGO_DB_ENGINE: postgres
      AI_EXEC_HEADLESS: "true"
      PLAYWRIGHT_BROWSERS_PATH: ${PLAYWRIGHT_BROWSERS_PATH:-/ms-playwright}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media:/app/media
      - ./pw-browsers:${PLAYWRIGHT_BROWSERS_PATH:-/ms-playwright}:rw
    shm_size: "1gb"
    command: ["bash", "-lc", "python manage.py autotest_worker --workers 1"]
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  db_data:
  redis_data:
  media:
