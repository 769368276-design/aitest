name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential libjpeg-dev zlib1g-dev

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          DJANGO_DEBUG: "true"
          DJANGO_ALLOWED_HOSTS: "*"
        run: |
          python manage.py test

